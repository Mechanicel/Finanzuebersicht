[project]
name = "finanzuebersicht"
version = "0.1.0"
description = "Monorepo dependency definition for FrontendService and markedataservice"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = []

[dependency-groups]
markedataservice = [
  "flask>=2.3,<4",
  "yfinance>=0.2.18,<1",
  "pandas>=1.5,<3",
]
frontend = [
  "customtkinter>=5.2,<6",
  "matplotlib>=3.8,<4",
  "numpy>=1.26,<3",
  "python-dotenv>=1.0,<2",
  "requests>=2.31,<3",
  "tkcalendar>=1.6,<2",
]
dev = []

[tool.uv]
default-groups = ["frontend"]


[project.gui-scripts]
finanzuebersicht = "FrontendService.src.launcher:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["FrontendService*", "markedataservice*"]

