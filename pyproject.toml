[project]
name = "finanzuebersicht-orchestrator"
version = "0.1.0"
description = "Optional root-level orchestrator for FrontendService and markedataservice"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
  "python-dotenv>=1.0,<2",
]

[project.scripts]
finanzuebersicht = "orchestrator:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["orchestrator"]
